    <style>
      /* Splash Screen Simples para evitar tela branca enquanto o Vue carrega */
      body { background-color: #0a0e17; margin: 0; }
      #app:empty {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e17;
      }
      #app:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 3px solid rgba(201, 168, 76, 0.2);
        border-top-color: #c9a84c;
        border-radius: 50%;
        animation: loading 0.8s linear infinite;
      }
      @keyframes loading {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      </div>
    
    <script type="module" src="/src/main.js"></script>

    </noscript>
